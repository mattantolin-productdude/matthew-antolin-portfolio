<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- background -->
  <rect width="600" height="400" fill="#141e2d"/>
  <!-- subtle grid -->
  <line x1="0" y1="80"  x2="600" y2="80"  stroke="#1d2d42" stroke-width="1"/>
  <line x1="0" y1="160" x2="600" y2="160" stroke="#1d2d42" stroke-width="1"/>
  <line x1="0" y1="240" x2="600" y2="240" stroke="#1d2d42" stroke-width="1"/>
  <line x1="0" y1="320" x2="600" y2="320" stroke="#1d2d42" stroke-width="1"/>
  <!-- bars -->
  <rect x="82"  y="210" width="48" height="110" fill="#253d5a" rx="3"/>
  <rect x="163" y="150" width="48" height="170" fill="#2b4f74" rx="3"/>
  <rect x="244" y="240" width="48" height="80"  fill="#253d5a" rx="3"/>
  <rect x="325" y="120" width="48" height="200" fill="#2e5c87" rx="3"/>
  <rect x="406" y="175" width="48" height="145" fill="#2b4f74" rx="3"/>
  <rect x="487" y="135" width="48" height="185" fill="#2e5c87" rx="3"/>
  <!-- trend line -->
  <polyline
    points="106,210 187,150 268,240 349,120 430,175 511,135"
    fill="none" stroke="#5a9bd5" stroke-width="2.5"
    stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="106" cy="210" r="5" fill="#5a9bd5"/>
  <circle cx="187" cy="150" r="5" fill="#5a9bd5"/>
  <circle cx="268" cy="240" r="5" fill="#5a9bd5"/>
  <circle cx="349" cy="120" r="5" fill="#5a9bd5"/>
  <circle cx="430" cy="175" r="5" fill="#5a9bd5"/>
  <circle cx="511" cy="135" r="5" fill="#5a9bd5"/>
</svg>
